name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android SDK Command Line Tools
        run: |
          mkdir -p ~/.android/cmdline-tools
          cd ~/.android/cmdline-tools
          curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
          unzip -q cmdline.zip
          [ -d "cmdline-tools" ] && mv cmdline-tools latest || (mkdir -p latest && mv cmdline-tools/. latest/ 2>/dev/null || true)
          rm -f cmdline.zip
          ls -la latest/bin/ 2>/dev/null | head -5

      - name: Accept licenses and install SDK components
        run: |
          export ANDROID_HOME=~/.android
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "SDK install complete"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install BeeWare briefcase only
        run: |
          pip install briefcase requests -q
          python -c "import briefcase; print('briefcase', briefcase.__version__)"

      - name: Build Android app
        run: |
          cd android_app
          echo "Creating Android project..."
          briefcase create android --no-input 2>&1 | tail -15
          echo ""
          echo "Building APK..."
          briefcase build android --no-input 2>&1 | tail -20

      - name: Find APK
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la android_app/build/android/*/clockin/build/outputs/apk/*/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clockin-android-apk
          path: |
            android_app/build/android/*/clockin/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: warn
